<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="rgba(201,220,255,0.22)"/>
    </pattern>
    <radialGradient id="glowR" cx="100%" cy="0%" r="70%" gradientUnits="userSpaceOnUse" fx="1200" fy="0">
      <stop offset="0%" stop-color="#6da4ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowL" cx="0%" cy="100%" r="55%" gradientUnits="userSpaceOnUse" fx="0" fy="630">
      <stop offset="0%" stop-color="#30c67c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6da4ff"/>
      <stop offset="100%" stop-color="#30c67c"/>
    </linearGradient>
  </defs>

  <!-- Fundo base -->
  <rect width="1200" height="630" fill="#060914"/>
  <!-- Grade de pontos -->
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glows atmosféricos -->
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>

  <!-- Barra de acento lateral esquerda -->
  <rect x="0" y="0" width="6" height="630" fill="url(#barGrad)"/>

  <!-- Elemento decorativo: código "&lt;/&gt;" muito sutil ao fundo -->
  <text x="640" y="530" font-family="'Courier New', monospace" font-size="400" font-weight="900"
        fill="rgba(109,164,255,0.032)" text-anchor="middle">&lt;/&gt;</text>

  <!-- Círculos decorativos no canto superior direito -->
  <circle cx="1090" cy="90" r="230" fill="none" stroke="rgba(109,164,255,0.07)" stroke-width="1"/>
  <circle cx="1090" cy="90" r="165" fill="none" stroke="rgba(109,164,255,0.055)" stroke-width="1"/>
  <circle cx="1090" cy="90" r="88"  fill="rgba(109,164,255,0.038)"/>

  <!-- Nome da marca -->
  <text x="72" y="106" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="31" font-weight="900" letter-spacing="5" fill="#6da4ff">DIEGO</text>
  <text x="205" y="106" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="31" font-weight="900" letter-spacing="5" fill="#30c67c">DEV</text>
  <text x="266" y="106" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="31" font-weight="900" fill="#6da4ff">_</text>

  <!-- Linha separadora sob a marca -->
  <line x1="72" y1="128" x2="296" y2="128" stroke="rgba(109,164,255,0.28)" stroke-width="1"/>

  <!-- Headline principal — linha 1 -->
  <text x="72" y="244" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="64" font-weight="800" fill="#f1f6ff" letter-spacing="-1.5">Desenvolvedor Web</text>
  <!-- Headline principal — linha 2 (cor primária) -->
  <text x="72" y="324" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="64" font-weight="800" fill="#6da4ff" letter-spacing="-1.5">Full Stack</text>

  <!-- Subtítulo de serviços -->
  <text x="72" y="394" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="26" font-weight="400" fill="#aebfdd">Landing Pages · Sites Institucionais · Sistemas Web</text>

  <!-- Divisória horizontal -->
  <line x1="72" y1="432" x2="650" y2="432" stroke="rgba(118,156,255,0.18)" stroke-width="1"/>

  <!-- Estatísticas — linha 1 -->
  <text x="72"  y="482" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="800" fill="#6da4ff">50+</text>
  <text x="128" y="482" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="400" fill="#8ba3c7"> projetos entregues</text>
  <circle cx="410" cy="474" r="3" fill="rgba(118,156,255,0.38)"/>
  <text x="428" y="482" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="800" fill="#30c67c">98%</text>
  <text x="492" y="482" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="400" fill="#8ba3c7"> de satisfação</text>

  <!-- Estatísticas — linha 2 -->
  <text x="72"  y="522" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="800" fill="#a0c6ff">3 anos</text>
  <text x="162" y="522" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="25" font-weight="400" fill="#8ba3c7"> de experiência</text>

  <!-- Pílula com URL -->
  <rect x="72" y="556" width="278" height="46" rx="23" fill="rgba(109,164,255,0.10)" stroke="rgba(109,164,255,0.28)" stroke-width="1"/>
  <text x="211" y="584" font-family="'Courier New', monospace"
        font-size="19" font-weight="700" fill="#6da4ff" text-anchor="middle">diegodev.dev.br</text>
</svg>
